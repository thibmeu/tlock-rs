name: Publish to crates.io

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      # Publish in dependency order: tlock -> tlock_age -> age-plugin-tlock
      - name: Publish tlock
        run: cargo publish -p tlock
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish tlock_age
        run: cargo publish -p tlock_age
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish age-plugin-tlock
        run: cargo publish -p age-plugin-tlock
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
